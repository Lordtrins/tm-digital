<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Digital</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#FFFFFF;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

.logo{
    width:850px;
    max-width:90vw;
    display:block;
    margin:0 auto;
}

.tagline{
    margin-top:30px;
    font-size:22px;
    letter-spacing:8px;
    color:#1F1F1F;
    font-weight:300;
}

.enter-btn{
    display:inline-block;
    margin-top:35px;
    padding:16px 65px;
    background:#000000;
    color:#FFFFFF;
    text-decoration:none;
    border-radius:10px;
    letter-spacing:8px;
    font-size:14px;
    font-weight:600;
}

@media (max-width:768px){
    .logo{
        width:92vw;
    }

    .tagline{
        font-size:16px;
        letter-spacing:4px;
    }

    .enter-btn{
        padding:14px 45px;
        font-size:13px;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="IMG+3908.png" alt="TM Digital Logo" class="logo">

    <p class="tagline">Built to stand out.</p>

    <a href="#" class="enter-btn">ENTER</a>

</div>

</body>
</html>
