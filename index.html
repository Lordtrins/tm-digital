<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Digital</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#FFFFFF;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    text-align:center;
}

.logo{
    width:700px;
    max-width:90vw;
    display:block;
    margin:0 auto;
}

.tagline{
    margin-top:30px;
    font-size:22px;
    letter-spacing:8px;
    color:#222;
}

.enter-btn{
    display:inline-block;
    margin-top:30px;
    padding:18px 60px;
    background:#111;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    letter-spacing:6px;
    font-size:14px;
    font-weight:600;
    transition:0.3s;
}

.enter-btn:hover{
    transform:translateY(-2px);
}

</style>
</head>
<body>
<div class="container">
<img src="IMG_3908.PNG" alt="TM Digital Logo" class="logo">
<p class="tagline">Built to stand out.</p>
ENTER
</div>
</body>
</html>
