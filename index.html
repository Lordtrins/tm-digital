<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Digital</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fadeIn 1.5s ease;
}

.logo{
    width:850px;
    max-width:90vw;
    display:block;
    margin:0 auto;
}

.tagline{
    margin-top:35px;
    font-size:26px;
    font-weight:300;
    letter-spacing:8px;
    color:#111;
}

.enter-btn{
    display:inline-block;
    margin-top:40px;
    padding:18px 70px;
    background:#000;
    color:#fff;
    text-decoration:none;
    border-radius:12px;
    letter-spacing:8px;
    font-size:15px;
    font-weight:600;
    transition:all .3s ease;
    box-shadow:0 15px 35px rgba(0,0,0,0.18);
}

.enter-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media (max-width:768px){

    .logo{
        width:95vw;
    }

    .tagline{
        font-size:18px;
        letter-spacing:4px;
        margin-top:25px;
    }

    .enter-btn{
        padding:15px 45px;
        font-size:14px;
        letter-spacing:6px;
    }

}

</style>
</head>
<body>
<div class="container">
<img src="IMG_3905.jpg" alt="TM Digital Logo" class="logo">

<p class="tagline">Built to stand out.</p>

<a href="#" class="enter-btn">ENTER</a>
</div>
</body>
</html>
